name: Waka Readme

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with WakaTime Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TIMEZONE: false
          SHOW_PROJECTS: true
          SHOW_LANGUAGE: true
          SHOW_OS: false
          SHOW_EDITORS: false
          SHOW_TOTAL_CODE_TIME: true
