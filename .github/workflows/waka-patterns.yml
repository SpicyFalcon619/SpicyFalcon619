name: Waka Coding Patterns

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  update-patterns:
    name: Update Coding Patterns (Night Owl + Day of Week)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SECTION_NAME: waka-patterns
          SHOW_SHORT_INFO: false
          SHOW_PROFILE_VIEWS: false
          SHOW_TOTAL_CODE_TIME: false
          SHOW_LANGUAGE: false
          SHOW_LANGUAGE_PER_REPO: false
          SHOW_PROJECTS: false
          SHOW_LOC_CHART: false
          SHOW_COMMIT: true
          SHOW_DAYS_OF_WEEK: true
          SHOW_TIMEZONE: false
          SHOW_OS: false
          SHOW_EDITORS: false
          SHOW_UPDATED_DATE: false

      - name: Sync with the commit the action just pushed
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Strip hardcoded emoji from the patterns section
        run: |
          sed -i \
            -e 's/🐱‍💻 *//g' -e 's/🐱 *//g' -e 's/📦 *//g' -e 's/🏆 *//g' \
            -e 's/🚫 *//g' -e 's/📜 *//g' -e 's/🔑 *//g' -e 's/📅 *//g' \
            -e 's/📊 *//g' -e 's/💬 *//g' -e 's/🌞 *//g' -e 's/🌆 *//g' \
            -e 's/🌃 *//g' -e 's/🌙 *//g' -e 's/ 🦉//g' -e 's/🦉//g' \
            README.md

      - name: Commit emoji cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Strip emoji from coding-patterns section [skip ci]"
          git push
